<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 12px;
    height: 60px;
    display: flex;
    align-items: center;
    overflow: hidden;
    user-select: none;
    -webkit-app-region: drag;
    background: var(--bg);
    color: var(--text);
    border-bottom: 1px solid var(--border);
  }
  /* Theme variables */
  :root {
    --bg: #1a1a1a;
    --bg-tab: transparent;
    --bg-tab-active: #2a2a2a;
    --bg-tab-hover: #222;
    --text: #aaa;
    --text-active: #e5e5e5;
    --border: #333;
    --accent: #1668dc;
    --close-hover: rgba(255,255,255,0.1);
  }
  [data-theme="light"] {
    --bg: #f0f0f0;
    --bg-tab: transparent;
    --bg-tab-active: #ffffff;
    --bg-tab-hover: #e8e8e8;
    --text: #666;
    --text-active: #1a1a1a;
    --border: #ddd;
    --accent: #0969DA;
    --close-hover: rgba(0,0,0,0.08);
  }
  /* macOS traffic lights padding + drag area */
  .traffic-light-spacer {
    width: 70px;
    flex-shrink: 0;
    -webkit-app-region: drag;
  }
  /* Right-side drag area */
  .drag-spacer {
    flex-shrink: 0;
    width: 60px;
    -webkit-app-region: drag;
  }
  .tab-container {
    display: flex;
    overflow-x: auto;
    overflow-y: hidden;
    height: 100%;
    align-items: center;
    gap: 4px;
    padding: 8px 0;
    -webkit-app-region: no-drag;
  }
  /* Empty space after tabs + "+" button becomes drag area */
  .tab-drag-fill {
    flex: 1;
    min-width: 20px;
    -webkit-app-region: drag;
  }
  .tab-container::-webkit-scrollbar { height: 0; }
  .tab {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 12px;
    height: 44px;
    max-width: 180px;
    min-width: 60px;
    cursor: pointer;
    white-space: nowrap;
    border-radius: 12px;
    background: var(--bg-tab);
    color: var(--text);
    position: relative;
    transition: background 0.1s, box-shadow 0.1s;
  }
  .tab:hover { background: var(--bg-tab-hover); }
  .tab.active {
    background: var(--bg-tab-active);
    color: var(--text-active);
    box-shadow: inset 0 0 0 2px var(--accent);
  }
  .tab.loading { opacity: 0.6; }
  .tab-name {
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }
  .tab-close {
    width: 16px;
    height: 16px;
    border-radius: 3px;
    border: none;
    background: none;
    color: var(--text);
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.1s, background 0.1s;
    flex-shrink: 0;
  }
  .tab:hover .tab-close { opacity: 1; }
  .tab-close:hover { background: var(--close-hover); }
  .new-tab-btn {
    width: 28px;
    height: 28px;
    border-radius: 4px;
    border: none;
    background: none;
    color: var(--text);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin: auto 6px;
    align-self: center;
    -webkit-app-region: no-drag;
    transition: background 0.1s;
  }
  .new-tab-btn:hover { background: var(--close-hover); color: var(--text-active); }
</style>
</head>
<body>
  <div class="traffic-light-spacer"></div>
  <div class="tab-container" id="tabs"><!-- tabs + newBtn rendered here --></div>
  <div class="tab-drag-fill"></div>

<script>
  let tabs = [];
  let activeTabId = null;

  const tabsEl = document.getElementById('tabs');
  const newBtn = document.getElementById('newBtn');

  function render() {
    tabsEl.innerHTML = '';
    tabs.forEach(tab => {
      const el = document.createElement('div');
      el.className = 'tab' + (tab.id === activeTabId ? ' active' : '') + (tab.status === 'loading' ? ' loading' : '');
      el.innerHTML = `
        <span class="tab-name" title="${tab.name}">${tab.status === 'loading' ? '⏳ ' : ''}${tab.name}</span>
        <button class="tab-close" data-id="${tab.id}">&times;</button>
      `;
      el.addEventListener('click', (e) => {
        if (e.target.classList.contains('tab-close')) return;
        window.tabAPI.switchTab(tab.id);
      });
      el.querySelector('.tab-close').addEventListener('click', (e) => {
        e.stopPropagation();
        window.tabAPI.closeTab(tab.id);
      });
      tabsEl.appendChild(el);
    });
    // "+" button always follows the last tab
    const btn = document.createElement('button');
    btn.className = 'new-tab-btn';
    btn.title = 'New project tab';
    btn.textContent = '+';
    btn.addEventListener('click', () => window.tabAPI.newTab());
    tabsEl.appendChild(btn);
  }

  window.tabAPI.onTabsUpdated((newTabs) => {
    tabs = newTabs;
    render();
  });

  window.tabAPI.onTabActivated((tabId) => {
    activeTabId = tabId;
    render();
  });

  window.tabAPI.onThemeChanged((theme) => {
    document.documentElement.setAttribute('data-theme', theme);
  });
</script>
</body>
</html>
