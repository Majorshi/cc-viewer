name: CI

on:
  push:
    branches:
      - main
      - test/**
      - fix/**
      - feat/**
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --no-fund --no-audit --ignore-scripts
      - run: npm test
